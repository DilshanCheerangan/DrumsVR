<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VR Drum Set Simulator</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="script.js"></script>
</head>

<body>
    <div id="ui-container">
        <div class="glass-panel main-panel">
            <h1 class="glow-text">NEON BEATS VR</h1>
            <p class="subtitle">Immersive Drumming Experience</p>
            <div class="divider"></div>
            <p class="instruction">
                <span class="icon">🥽</span> Enter VR to play with controllers
            </p>
            <p class="instruction">
                <span class="icon">⌨️</span> Or use keyboard numbers <span class="highlight">[1-8]</span>
            </p>
        </div>

        <div class="glass-panel controls-panel">
            <h3>Desktop Controls</h3>
            <div class="key-grid">
                <div class="key-item"><kbd>1</kbd> Kick</div>
                <div class="key-item"><kbd>2</kbd> Snare</div>
                <div class="key-item"><kbd>3</kbd> Hi-Hat</div>
                <div class="key-item"><kbd>4</kbd> Hi Tom</div>
                <div class="key-item"><kbd>5</kbd> Mid Tom</div>
                <div class="key-item"><kbd>6</kbd> Floor Tom</div>
                <div class="key-item"><kbd>7</kbd> Crash</div>
                <div class="key-item"><kbd>8</kbd> Ride</div>
            </div>
        </div>
    </div>

    <a-scene background="color: #050505" renderer="antialias: true; colorManagement: true">

        <!-- Environment Lighting -->
        <a-light type="ambient" color="#111"></a-light>
        <a-light type="spot" position="0 4 1" rotation="-75 0 0" angle="45" penumbra="0.5" intensity="2" color="#e6f2ff"
            castShadow="true"></a-light>
        <!-- Floor -->
        <a-plane position="0 0 0" rotation="-90 0 0" width="10" height="10" color="#1a1a1a" roughness="0.8"
            metalness="0.2"></a-plane>

        <!-- Player Rig -->
        <a-entity id="rig" position="0 0 0">
            <a-camera id="head" position="0 1.6 0"></a-camera>

            <!-- Left Hand/Stick -->
            <a-entity id="leftHand" laser-controls="hand: left" drumstick="hand: left">
                <!-- Drumstick Visual -->
                <a-cylinder radius="0.008" height="0.4" position="0 0.1 -0.15" rotation="90 0 0" color="#d9b38c">
                    <a-sphere class="stick-tip" radius="0.012" position="0 0.2 0" color="#f2e6d9"></a-sphere>
                </a-cylinder>
            </a-entity>

            <!-- Right Hand/Stick -->
            <a-entity id="rightHand" laser-controls="hand: right" drumstick="hand: right">
                <!-- Drumstick Visual -->
                <a-cylinder radius="0.008" height="0.4" position="0 0.1 -0.15" rotation="90 0 0" color="#d9b38c">
                    <a-sphere class="stick-tip" radius="0.012" position="0 0.2 0" color="#f2e6d9"></a-sphere>
                </a-cylinder>
            </a-entity>
        </a-entity>

        <!-- Drum Kit -->
        <a-entity id="drum-kit" position="0 0 -0.8">

            <!-- Kick Drum -->
            <a-entity drum="type: kick" position="0 0.4 0" rotation="90 0 0">
                <a-cylinder radius="0.3" height="0.4" color="#aa1111" side="double"></a-cylinder>
                <a-circle radius="0.29" position="0 0.201 0" rotation="-90 0 0" color="#f2f2f2"></a-circle>
                <a-circle radius="0.29" position="0 -0.201 0" rotation="90 0 0" color="#1a1a1a"></a-circle>
            </a-entity>

            <!-- Snare -->
            <a-entity drum="type: snare" position="-0.3 0.8 0.3" rotation="10 20 0">
                <a-cylinder radius="0.18" height="0.12" color="#cccccc"></a-cylinder>
                <a-circle radius="0.175" position="0 0.061 0" rotation="-90 0 0" color="#f2f2f2"></a-circle>
            </a-entity>

            <!-- Hi-Hat -->
            <a-entity drum="type: hihat" position="-0.55 0.95 0.4" rotation="5 -10 -5">
                <a-cylinder radius="0.15" height="0.01" color="#cc9900"></a-cylinder>
                <a-cylinder radius="0.15" height="0.01" position="0 0.02 0" color="#cc9900"></a-cylinder>
                <a-cylinder radius="0.01" height="1.0" position="0 -0.5 0" color="#666"></a-cylinder>
            </a-entity>

            <!-- High Tom -->
            <a-entity drum="type: tom1" position="-0.15 1.05 0.1" rotation="25 15 0">
                <a-cylinder radius="0.14" height="0.18" color="#aa1111"></a-cylinder>
                <a-circle radius="0.135" position="0 0.091 0" rotation="-90 0 0" color="#f2f2f2"></a-circle>
            </a-entity>

            <!-- Mid Tom -->
            <a-entity drum="type: tom2" position="0.15 1.05 0.1" rotation="25 -15 0">
                <a-cylinder radius="0.15" height="0.2" color="#aa1111"></a-cylinder>
                <a-circle radius="0.145" position="0 0.101 0" rotation="-90 0 0" color="#f2f2f2"></a-circle>
            </a-entity>

            <!-- Floor Tom -->
            <a-entity drum="type: floortom" position="0.45 0.65 0.3" rotation="5 -10 0">
                <a-cylinder radius="0.22" height="0.35" color="#aa1111"></a-cylinder>
                <a-circle radius="0.215" position="0 0.176 0" rotation="-90 0 0" color="#f2f2f2"></a-circle>
            </a-entity>

            <!-- Crash Cymbal -->
            <a-entity drum="type: crash" position="-0.45 1.3 -0.1" rotation="15 30 10">
                <a-cylinder radius="0.25" height="0.005" color="#e6b800"></a-cylinder>
                <a-cylinder radius="0.01" height="1.3" position="0 -0.65 0" color="#666"></a-cylinder>
            </a-entity>

            <!-- Ride Cymbal -->
            <a-entity drum="type: ride" position="0.45 1.25 -0.1" rotation="15 -20 -10">
                <a-cylinder radius="0.28" height="0.005" color="#ffcc00"></a-cylinder>
                <a-cylinder radius="0.01" height="1.25" position="0 -0.625 0" color="#666"></a-cylinder>
            </a-entity>

        </a-entity>
    </a-scene>
</body>

</html>
